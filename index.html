<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF5722" />
  <title>Lista de Compras</title>
  <link rel="icon" type="image/png" href="./Carrinho.png" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://unpkg.com/@zxing/library@0.19.2/umd/index.min.js"></script>
  <style>
    :root{
      --bg:#f1f1f1;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,.08);
      --primary:#ff5722;
      --primary-hover:#e64a19;
      --radius:16px;
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app{
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 12px;
      padding: 6px 0 10px;
    }
    .logo{
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,.10);
      padding: 10px;
      object-fit: contain;
    }
    .title{
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .card h2{
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 800;
    }

    .row{
      display:flex;
      gap: 10px;
      align-items:center;
      margin-bottom: 10px;
    }

    input{
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 16px;
      outline: none;
      background: #fff;
    }
    input:focus{
      border-color: rgba(255,87,34,.55);
      box-shadow: 0 0 0 4px rgba(255,87,34,.12);
    }

    .btn-icon{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .btn-primary{
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(255,87,34,.22);
    }
    .btn-primary:hover{ background: var(--primary-hover); }

    /* Autocomplete */
    .autocomplete-wrapper{
      position: relative;
      flex: 1;
    }
    .autocomplete-wrapper input{
      width: 100%;
    }
    .input-quantidade{
      flex: 0 0 120px;
      width: 120px;
    }
    /* ── Overlay de busca (grade de produtos) ── */
    .autocomplete-list{
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #fff;
      z-index: 800;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .autocomplete-list.aberto{ display: block; }

    .ac-overlay-header{
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ac-overlay-voltar{
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #333;
      padding: 0 4px;
      line-height: 1;
    }
    .ac-overlay-termo{
      font-size: 20px;
      font-weight: 700;
      color: #111;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: lowercase;
    }

    /* Grade 3 colunas */
    .ac-grid{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px 10px 80px;
    }

    /* Card de produto */
    .autocomplete-item{
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }
    .autocomplete-item:active{
      background: #fff5f2;
    }
    .ac-img-wrap{
      position: relative;
      aspect-ratio: 1 / 1;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .ac-loja-badge{
      position: absolute;
      top: 5px;
      left: 5px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      backdrop-filter: blur(2px);
      max-width: calc(100% - 10px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Cor por loja */
    .ac-loja-badge[data-loja="Atacadão"]{ background: rgba(220,38,38,0.80); }
    .ac-loja-badge[data-loja="Mateus"]  { background: rgba(22,163,74,0.80); }
    .ac-loja-badge[data-loja="Fribal"]  { background: rgba(37,99,235,0.80); }
    .autocomplete-item .ac-thumb{
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }
    .ac-no-img{
      font-size: 28px;
      color: #d1d5db;
    }
    .ac-add-btn{
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 32px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
      flex-shrink: 0;
    }
    .ac-card-info{
      padding: 6px 8px 8px;
    }
    .autocomplete-item .ac-preco{
      font-size: 12px;
      font-weight: 700;
      color: #111;
      display: block;
      margin-bottom: 2px;
    }
    .autocomplete-item .ac-nome{
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Campo de preço */
    .preco-row{
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .preco-wrapper{
      position: relative;
      flex: 1;
    }
    .preco-prefix{
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      pointer-events: none;
    }
    .preco-wrapper input{
      padding-left: 32px;
    }

    /* Lista */
    ul.lista{
      list-style: none;
      padding: 0;
      margin: 0;
      display:flex;
      flex-direction: column;
      gap: 10px;
    }
    ul.lista li{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .item-thumb{
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: contain;
      background: #f9fafb;
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }
    .item-thumb-placeholder{
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px dashed var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }
    .item-info{
      flex: 1;
      text-align: left;
    }
    .item-info .name{
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      width: fit-content;
    }
    .item-info .name:hover .name-text{
      text-decoration: underline;
      color: var(--primary);
    }
    .item-info .meta{
      color: var(--muted);
      font-size: 13px;
    }
    .foto-badge{
      font-size: 13px;
    }
    .item-cod{
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      background: #f3f4f6;
      border-radius: 6px;
      padding: 1px 6px;
      margin-top: 3px;
      letter-spacing: .3px;
      font-family: monospace;
    }

    /* ── Scanner modal ───────────────────────────────────── */
    .scanner-overlay{
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .scanner-overlay.aberto{ display: flex; }
    .scanner-box{
      width: 100%;
      max-width: 400px;
      padding: 24px 20px;
      text-align: center;
    }
    .scanner-titulo{
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 14px;
    }
    .scanner-video-wrap{
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }
    #scannerVideo{
      width: 100%;
      display: block;
      border-radius: 14px;
    }
    .scanner-mira{
      position: absolute;
      inset: 0;
      border: 3px solid var(--primary);
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.35);
    }
    .scanner-mira::before, .scanner-mira::after{
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #fff;
      border-style: solid;
    }
    .scanner-mira::before{ top: 12px; left: 12px; border-width: 3px 0 0 3px; }
    .scanner-mira::after{  bottom: 12px; right: 12px; border-width: 0 3px 3px 0; }
    .scanner-status{
      color: #aaa;
      font-size: 13px;
      margin: 12px 0 0;
      min-height: 20px;
    }
    .btn-cancelar-scan{
      margin-top: 16px;
      padding: 12px 36px;
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-cancelar-scan:hover{ background: rgba(255,255,255,.2); }
    .item-direita {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .item-preco{
      font-weight: 700;
      color: var(--primary);
      font-size: 15px;
      white-space: nowrap;
      min-height: 20px;
    }
    .item-btns {
      display: flex;
      gap: 6px;
    }
    .item-btns button{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor:pointer;
      font-size: 18px;
    }
    .actions{
      display:flex;
      gap: 8px;
      align-items:center;
    }
    .actions button{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor:pointer;
      font-size: 18px;
    }

    /* Total */
    .total-bar{
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: linear-gradient(135deg, #ff5722, #e64a19);
      border-radius: 14px;
      color: #fff;
      margin-top: 12px;
    }
    .total-bar .total-label{
      font-size: 15px;
      font-weight: 700;
      opacity: .9;
    }
    .total-bar .total-valor{
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.5px;
    }
    .total-bar.vazio{
      display: none;
    }

    /* Modal de foto */
    .modal-overlay{
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.aberto{ display: flex; }

    .modal{
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-header{
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3{
      margin: 0;
      font-size: 17px;
      font-weight: 800;
    }
    .modal-close{
      background: #f3f4f6;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
    }
    .modal-close:hover{ background: #e5e7eb; }

    .foto-preview{
      width: 100%;
      border-radius: 14px;
      border: 2px dashed var(--border);
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f9fafb;
    }
    .foto-preview img{
      width: 100%;
      object-fit: contain;
      max-height: 280px;
    }
    .foto-preview .sem-foto{
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
      line-height: 2;
    }

    .modal-acoes{
      display: flex;
      gap: 10px;
    }
    .modal-acoes label, .modal-acoes button{
      flex: 1;
      padding: 11px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      background: #fff;
    }
    .modal-acoes label:hover{ background: #f9fafb; }

    .btn-remover-foto{
      color: #ef4444;
      border-color: #fca5a5 !important;
    }
    .btn-remover-foto:hover{ background: #fef2f2 !important; }

    #inputFoto, #inputCamera{ display: none; }

    /* Responsivo */
    @media (max-width: 640px){
      .title{ font-size: 22px; }

      /* Produto e Quantidade: empilhados, largura total, altura normal */
      .row{
        flex-direction: column;
        align-items: stretch;
      }
      .row .autocomplete-wrapper{ width: 100%; }
      /* IMPORTANTE: reseta o flex do quantidade para não virar altura */
      #quantidade{
        flex: none !important;
        width: 100% !important;
        height: auto !important;
      }

      /* Preço (R$): largura total — !important para sobrescrever inline style */
      .preco-row{
        flex-wrap: wrap;
        gap: 10px;
      }
      .preco-wrapper{
        flex: 0 0 100% !important;
        width: 100% !important;
      }

      /* Categoria + lupa: mesma linha */
      #categoria{
        flex: 1 !important;
        width: auto !important;
        min-width: 0;
      }
      #btnBuscar{
        flex: 0 0 52px !important;
        width: 52px !important;
      }

      /* Thumbnail menor no celular */
      .item-thumb, .item-thumb-placeholder{
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <img class="logo" src="./Carrinho.png" alt="Carrinho de supermercado" />
    </div>

    <section class="card">
      <h2>Adicionar item</h2>

      <div class="row">
        <div class="autocomplete-wrapper">
          <input type="text" id="produto" placeholder="Produto" autocomplete="off" style="padding-right: 44px;" />
          <button id="btnScan" title="Escanear código de barras" style="position:absolute; right:6px; top:50%; transform:translateY(-50%); width:34px; height:34px; border:none; background:transparent; cursor:pointer; font-size:20px; z-index:2; padding:0;">📷</button>
          <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
        <input type="text" id="quantidade" placeholder="Quantidade" class="input-quantidade" />
      </div>

      <div class="preco-row">
        <div class="preco-wrapper" style="flex:1;">
          <span class="preco-prefix">R$</span>
          <input type="number" id="preco" placeholder="0,00" min="0" step="0.01" />
        </div>
        <input type="text" id="categoria" placeholder="Categoria (opcional)" style="flex:1;" />
        <button id="btnBuscar" class="btn-icon" title="Filtrar por categoria">🔍</button>
      </div>

      <button id="btnIncluir" class="btn-primary">+ Incluir item</button>
    </section>

    <section class="card">
      <h2>Itens adicionados</h2>
      <ul id="lista" class="lista"></ul>
      <div class="total-bar vazio" id="totalBar">
        <span class="total-label">Total da compra</span>
        <span class="total-valor" id="totalValor">R$ 0,00</span>
      </div>
    </section>
  </main>

  <!-- Modal Scanner de código de barras -->
  <div id="scannerModal" class="scanner-overlay">
    <div class="scanner-box">
      <p class="scanner-titulo" id="scannerTitulo">Aponte para o código de barras</p>
      <div class="scanner-video-wrap">
        <video id="scannerVideo" playsinline></video>
        <div class="scanner-mira"></div>
      </div>
      <p id="scanStatus" class="scanner-status">Iniciando câmera...</p>
      <button onclick="fecharScanner()" class="btn-cancelar-scan">✕ Cancelar</button>
    </div>
  </div>

  <!-- Modal de foto -->
  <div class="modal-overlay" id="modalFoto">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalNomeProduto">Foto do produto</h3>
        <button class="modal-close" id="btnFecharModal">✕</button>
      </div>
      <div class="foto-preview" id="fotoPreview">
        <div class="sem-foto">📷<br>Nenhuma foto ainda</div>
      </div>
      <div class="modal-acoes">
        <label for="inputFoto">📁 Arquivo</label>
        <label for="inputCamera">📷 Câmera</label>
        <button class="btn-remover-foto" id="btnRemoverFoto" style="display:none">🗑 Remover</button>
      </div>
      <input type="file" id="inputFoto" accept="image/*" />
      <input type="file" id="inputCamera" accept="image/*" capture="environment" />
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove, update, off } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD0zPaADARoJLxTyDf6GIy_2BOzKc3v8x8",
      authDomain: "compras-ca22d.firebaseapp.com",
      databaseURL: "https://compras-ca22d-default-rtdb.firebaseio.com",
      projectId: "compras-ca22d",
      storageBucket: "compras-ca22d.firebasestorage.app",
      messagingSenderId: "823577033462",
      appId: "1:823577033462:web:1e7794ab17296067f40ad7"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const listId = "minha-lista-dev";   // lista separada para ambiente de desenvolvimento
    const $produto   = document.getElementById("produto");
    const $qtd       = document.getElementById("quantidade");
    const $preco     = document.getElementById("preco");
    const $cat       = document.getElementById("categoria");
    const $btnBuscar = document.getElementById("btnBuscar");
    const $btnIncluir= document.getElementById("btnIncluir");
    const $lista     = document.getElementById("lista");
    const $totalBar  = document.getElementById("totalBar");
    const $totalValor= document.getElementById("totalValor");
    const $acList    = document.getElementById("autocompleteList");

    const VAPID_KEY = "BFHkWOAl_F-Koq61YEOvgHHPPyUXvIrzelral64T4VxcDUhnEnQHe8eUoM1p4ipyX5OycB84LgpPqXwuDv4QR1k";

    const deviceId = localStorage.getItem('deviceId') || (() => {
      const id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substr(2, 16));
      localStorage.setItem('deviceId', id);
      return id;
    })();

    // ── Banco de produtos ─────────────────────────────────────
    let produtosDB = [];
    let acAtivo = -1;

    // Índice EAN → produto para busca rápida pelo scanner
    let eanIndex = {};       // EAN → produto (Atacadão)
    let eanNotasIndex = {};  // EAN → produto (notas fiscais - EAN real)

    async function carregarProdutos() {
      try {
        // Banco do Atacadão (autocomplete)
        const res = await fetch('./produtos_atacadao.json?v=' + Date.now());
        const data = await res.json();
        produtosDB = data.produtos || [];
        eanIndex = {};
        for (const p of produtosDB) {
          p.loja = 'Atacadão';          // marca a loja de origem
          if (p.ean) eanIndex[p.ean] = p;
        }

        // Banco do Mateus Mais (se existir)
        try {
          const resMateus = await fetch('./produtos_v2.json?v=' + Date.now());
          const dataMateus = await resMateus.json();
          for (const p of (dataMateus.produtos || [])) {
            p.loja = 'Mateus';          // marca a loja de origem
            produtosDB.push(p);
          }
        } catch(e) { /* opcional */ }

        // Banco de notas fiscais (EAN-13 real)
        const resNotas = await fetch('./produtos_notas.json?v=' + Date.now());
        const dataNotas = await resNotas.json();
        eanNotasIndex = {};
        for (const p of (dataNotas.produtos || [])) {
          if (!p.loja) p.loja = 'Outro'; // usa o campo loja do JSON (ex: "Fribal")
          if (p.ean) eanNotasIndex[p.ean] = p;
          // Adiciona ao autocomplete também
          produtosDB.push(p);
        }

        console.log(`Produtos Atacadão: ${produtosDB.length - Object.keys(eanNotasIndex).length} | Notas fiscais: ${Object.keys(eanNotasIndex).length}`);
      } catch(e) {
        console.warn('Não foi possível carregar produtos:', e.message);
      }
    }

    function buscarProdutos(termo) {
      if (!termo || termo.length < 2) return [];
      const t = termo.toLowerCase();
      const resultados = [];
      for (const p of produtosDB) {
        if (p.n.toLowerCase().includes(t)) {
          resultados.push(p);
          if (resultados.length >= 16) break;
        }
      }
      return resultados;
    }

    function formatarPreco(valor) {
      return valor > 0

        preco.textContent = precoTxt + unidTxt;

    function mostrarNotificacao(titulo, corpo) {
      if (Notification.permission !== 'granted') return;
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(titulo, {
          body: corpo,
          icon: './Carrinho.png',
          badge: './Carrinho.png'
        });
      });
    }

    async function iniciarNotificacoes() {
      if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
      const permissao = await Notification.requestPermission();
      if (permissao !== 'granted') return;
      try {
        const messaging = getMessaging(app);
        const token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (token) {
          const tokenKey = token.substring(0, 30).replace(/[^a-zA-Z0-9]/g, '_');
          await set(ref(db, `fcm_tokens/${tokenKey}`), { token, ts: Date.now() });
        }
        onMessage(messaging, (payload) => {
          mostrarNotificacao(
            payload.notification?.title || 'Lista de Compras',
            payload.notification?.body  || 'A lista foi atualizada!'
          );
        });
      } catch (e) {
        console.warn('FCM não disponível:', e.message);
      }
    }

    function caminhoLista() {

    function observarLista() {
      if (detach) {
        off(ref(db, caminhoLista()));
        detach = null;
      }
      const r = ref(db, caminhoLista());
      detach = onValue(r, (snap) => {
        const dados = snap.val() || {};
        const novosItens = Object.entries(dados).map(([id, v]) => ({ id, ...v }));

        if (primeiraCarregada) {
          novosItens.forEach(item => {
            if ((item.ts || 0) > ultimoTs && item.deviceId !== deviceId) {
              mostrarNotificacao(
                `🛒 ${item.produto} adicionado!`,
                item.quantidade ? `Quantidade: ${item.quantidade}` : 'Novo item na lista'
              );
            }
          });
        }

        ultimoTs = novosItens.length > 0 ? Math.max(...novosItens.map(i => i.ts || 0)) : ultimoTs;
        primeiraCarregada = true;
        itensCache = novosItens;
        renderizar();
      }, (err) => {
        console.error(err);
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function comprimirImagem(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const MAX = 800;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else       { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.80));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderizar() {
      $lista.innerHTML = "";
      const origem = filtroCategoria
        ? itensCache.filter(i => (i.categoria || "").toLowerCase().includes(filtroCategoria))
        : itensCache;

      const origemOrdenada = [...origem].sort((a,b) => (b.ts||0) - (a.ts||0));

      let totalCompra = 0;

      origemOrdenada.forEach(item => {
        const li = document.createElement("li");

        const info = document.createElement("div");
        info.className = "item-info" + (item.riscado ? " riscado" : "");

        const nameDiv = document.createElement("div");
        nameDiv.className = "name";
        nameDiv.title = "Clique para ver/adicionar foto";

        const nameSpan = document.createElement("span");
        nameSpan.className = "name-text";
        nameSpan.textContent = item.produto || "";
        nameDiv.appendChild(nameSpan);


        nameDiv.addEventListener("click", () => abrirModalFoto(item.id));

        const meta = document.createElement("div");
        meta.className = "meta";
        const qtdTxt = item.quantidade ? `Qtd: ${item.quantidade}` : '';
        const catTxt = item.categoria ? ` • ${item.categoria}` : '';
        meta.textContent = qtdTxt + catTxt;


        info.appendChild(nameDiv);
        info.appendChild(meta);

        // Thumbnail do produto (clicável para abrir modal)
        let thumbEl;
        if (item.foto && item.foto.startsWith('http')) {
          thumbEl = document.createElement('img');
          thumbEl.className = 'item-thumb';
          thumbEl.src = item.foto;
          thumbEl.alt = item.produto || '';
          thumbEl.onerror = () => { thumbEl.src = ''; thumbEl.style.display='none'; };
          thumbEl.addEventListener('click', () => abrirModalFoto(item.id));
        } else if (item.foto && item.foto.startsWith('data:')) {
          thumbEl = document.createElement('img');
          thumbEl.className = 'item-thumb';
          thumbEl.src = item.foto;
          thumbEl.alt = item.produto || '';
          thumbEl.addEventListener('click', () => abrirModalFoto(item.id));
        } else {
          thumbEl = document.createElement('div');
          thumbEl.className = 'item-thumb-placeholder';
          thumbEl.textContent = '📷';
          thumbEl.title = 'Clique para adicionar foto';
          thumbEl.addEventListener('click', () => abrirModalFoto(item.id));
        }

        // Preço do item (aceita vírgula no formato brasileiro)
        const preco = parseFloat(item.preco) || 0;
        const qtd = parseFloat((item.quantidade || '1').toString().replace(',', '.')) || 1;
        const subtotal = preco * qtd;
        if (preco > 0) totalCompra += subtotal;

        const precoDiv = document.createElement("div");
        precoDiv.className = "item-preco";
        if (preco > 0) {
          const unid = item.unidade ? ` / ${item.unidade}` : '';
          if (qtd !== 1) {
            // Mostra: R$ 17,99 × 1,5 = R$ 26,99
            precoDiv.innerHTML =
              `<span style="font-size:12px;opacity:.8">${formatarPreco(preco)} × ${qtd}</span><br>` +
              `<span>= ${formatarPreco(subtotal)}</span>`;
          } else {
            precoDiv.textContent = formatarPreco(preco) + unid;
          }
        }

        const excluir = document.createElement("button");
        excluir.title = "Excluir";
        excluir.textContent = "🗑️";
        excluir.onclick = async () => {
          try {
            await remove(ref(db, `${caminhoLista()}/${item.id}`));
          } catch (e) {
            console.error(e);
          }
        };

        // Coluna direita: preço em cima, excluir embaixo

        direita.className = "item-direita";
        direita.appendChild(precoDiv);
        direita.appendChild(excluir);

        li.appendChild(thumbEl);
        li.appendChild(info);
        li.appendChild(direita);
        $lista.appendChild(li);
      });

      // Atualizar total

        $totalValor.textContent = 'R$ ' + totalCompra.toFixed(2).replace('.', ',');
        $totalBar.classList.remove('vazio');

    // ── Scanner de código de barras ────────────────────────────────────
    let codeReader = null;

    // Input oculto para fallback iOS (câmera nativa)
    const inputFoto = document.createElement('input');
    inputFoto.type = 'file';
    inputFoto.accept = 'image/*';
    inputFoto.setAttribute('capture', 'environment');
    inputFoto.style.display = 'none';
    document.body.appendChild(inputFoto);

    inputFoto.addEventListener('change', async () => {
      const file = inputFoto.files[0];
      if (!file) return;
      inputFoto.value = '';
      setScanStatus('Lendo código de barras...');
      document.getElementById('scannerModal').classList.add('aberto');
      try {
        const ean = await decodificarImagem(file);
        fecharScanner();
        if (ean) {
          await processarEAN(ean);
        } else {
          setScanStatus('Código de barras não encontrado na foto. Tente novamente.');
          setTimeout(fecharScanner, 3000);
        }
      } catch(e) {
        setScanStatus('Erro ao processar imagem.');
        setTimeout(fecharScanner, 2000);
      }
    });

    async function decodificarImagem(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width  = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          try {
            const reader = new ZXing.BrowserMultiFormatReader();
            const result = reader.decodeFromCanvas(canvas);
            resolve(result ? result.getText() : null);
          } catch(e) {
            resolve(null);
          }
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    document.getElementById('btnScan').addEventListener('click', abrirScanner);

    function abrirScanner() {
      // Verifica se mediaDevices está disponível (HTTPS ou localhost)
      const temCamera = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

      if (!temCamera) {
        // iOS via HTTP: usa câmera nativa (tira foto)
        inputFoto.click();
        return;
      }

      // Modo vídeo ao vivo (Android/Chrome ou HTTPS)
      const modal = document.getElementById('scannerModal');
      modal.classList.add('aberto');
      setScanStatus('Procurando código de barras...');

      if (typeof ZXing === 'undefined') {
        setScanStatus('Erro: biblioteca não carregada.');
        return;
      }

      codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromConstraints(
        { video: { facingMode: { ideal: 'environment' } } },
        'scannerVideo',
        async (result, err) => {
          if (result) {
            const ean = result.getText();
            fecharScanner();
            await processarEAN(ean);
          }
          if (err && err.name !== 'NotFoundException') {
            setScanStatus('Erro ao ler câmera');
          } else if (!result) {
            setScanStatus('Procurando código de barras...');
          }
        }
      ).catch(e => {
        fecharScanner();
        // Fallback para foto se vídeo falhar
        inputFoto.click();
      });
    }

    function fecharScanner() {
      if (codeReader) { codeReader.reset(); codeReader = null; }
      document.getElementById('scannerModal').classList.remove('aberto');
    }

    function setScanStatus(msg) {
      const el = document.getElementById('scanStatus');
      if (el) el.textContent = msg;
    }

    async function processarEAN(ean) {
      const $prod = document.getElementById('produto');
      $prod.value = 'Buscando produto...';
      $prod.disabled = true;

      try {
        const dadosAPI = await buscarDadosPorEAN(ean);

        if (!dadosAPI) {
          $prod.disabled = false;
          $prod.value = '';
          $prod.placeholder = 'EAN ' + ean + ' nao encontrado';
          setTimeout(() => { $prod.placeholder = 'Produto'; }, 3000);
          return;
        }

        // 1. Busca nas notas fiscais (EAN-13 real — mais preciso)
        const produtoNota = eanNotasIndex[ean];

        if (produtoNota) {
          selecionarProduto(produtoNota);
        } else {
          // 2. Busca no banco do Atacadão pelo EAN interno
          const produtoEAN = eanIndex[ean];
          if (produtoEAN) {
            selecionarProduto(produtoEAN);
          } else {
            // 3. Tenta por nome
            const produtoNome = buscarNoMateus(dadosAPI.nome);
            if (produtoNome) {
              selecionarProduto(produtoNome);
            } else {
              // 4. Usa dados da Open Food Facts
              $prod.value = dadosAPI.nome;
              imagemSelecionada = dadosAPI.imagem || '';
              unidadeSelecionada = dadosAPI.unidade || '';
              if (dadosAPI.preco > 0) {
                document.getElementById('preco').value = dadosAPI.preco.toFixed(2);
              }
            }
          }
        }

      } catch (e) {
        $prod.value = '';
        $prod.placeholder = 'Erro ao buscar produto';
        setTimeout(() => { $prod.placeholder = 'Produto'; }, 3000);
        console.warn('Erro ao processar EAN:', e);
      }

      $prod.disabled = false;
    }

    async function buscarDadosPorEAN(ean) {
      try {
        const resp = await fetch(
          'https://world.openfoodfacts.org/api/v0/product/' + ean + '.json',
          { signal: AbortSignal.timeout(8000) }
        );
        const data = await resp.json();
        if (data.status === 1 && data.product) {
          const p = data.product;
          const nome = p.product_name_pt || p.product_name || p.generic_name_pt || p.generic_name || null;
          if (!nome) return null;

          // Pega imagem do produto se disponível
          const imagem = p.image_front_small_url || p.image_small_url || p.image_url || '';

          // Tenta extrair quantidade/unidade
          let unidade = '';
          if (p.quantity) {
            const match = p.quantity.match(/(\d+)\s*(g|kg|ml|l|un)/i);
            if (match) unidade = match[1] + match[2].toLowerCase();
          }

          return { nome, imagem, unidade, preco: 0 };
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    function buscarNoMateus(nomeProduto) {
      if (!nomeProduto || !produtosDB || !produtosDB.length) return null;

      const normalizar = str =>
        str.toLowerCase()
           .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
           .replace(/[^a-z0-9 ]/g, ' ').trim();

      const nomeNorm = normalizar(nomeProduto);
      const palavras = nomeNorm.split(/\s+/).filter(p => p.length > 3);
      if (palavras.length === 0) return null;

      let melhorScore = 0;
      let melhorProduto = null;

      for (const p of produtosDB) {
        const pNorm = normalizar(p.n);
        let score = 0;
        for (const palavra of palavras) {
          if (pNorm.includes(palavra)) score++;
        }
        if (score > melhorScore) {
          melhorScore = score;
          melhorProduto = p;
        }
      }

      const minScore = Math.ceil(palavras.length / 2);
      return melhorScore >= minScore ? melhorProduto : null;
    }

    // Expõe para teste via console (pode remover em produção)
    window._testEAN = processarEAN;

    carregarProdutos();
    observarLista();
    iniciarNotificacoes();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }
  </script>
